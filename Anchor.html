<!--7.	Create a webpage with anchor tags that navigate to different sections using internal links.-->
<!DOCTYPE html>
<html>
    <head>
        <title>INTERNAL LINK ANCHOR</title>

        <style>
           body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(245, 220, 228);
            margin: 0;
           }

           h1{
            text-align: center;
            color: #f12987;
            background-color: rgb(241, 147, 208);
            padding: 20px;
            margin: 90px;
           }

           nav{
            background-color: rgb(249, 169, 205);
            padding: 15px;
            text-align: center;
           }

           nav a {
            color: rgb(52, 32, 201);
            text-decoration: dotted;
            margin: 15px;
            font-size: larger;
           }

           nav a:hover{
            color: red;
           }

           section{
            color: #67123a;
            padding: 60px;
            height: 40px;
           }

           #home{
            background-color: pink;
           }

            #contact{
            background-color: pink;
           }


            #course{
            background-color: pink;
           }
        </style>
    </head>

  <body>

    <h1>WEBPAGE</h1>
<nav>
    <a href="#about">About</a>
    <a href="#course">course</a>
    <a href="#contact">contact</a>
</nav>


<section id="course">
    <h2>Course section</h2>
    <p>HTML,CSS,JAVA</p>
</section>


<section id="home">
    <h2>Home section</h2>
    <p>welcome to my webpage</p>
</section>


<section id="contact">
    <h2>Contact section</h2>
    <p>Email : chauhanchanchal@gmail.com</p>
</section>
  </body>  
</html>
