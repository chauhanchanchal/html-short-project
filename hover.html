<!--9.	Use CSS to create a hover dropdown menu for a college website navigation bar.-->


<!DOCTYPE html>
<html>
<head>
<title>Dropdown Menu</title>

<style>
body{
    margin:0;
    font-family: Arial;
}

/* Navbar */
nav{
    background-color:#2c3e50;
    padding:10px;
}

/* Main menu */
nav ul{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
}

/* Menu items */
nav ul li{
    position:relative;
}

/* Links */
nav ul li a{
    color:white;
    text-decoration:none;
    padding:12px 20px;
    display:block;
}

/* Hover effect */
nav ul li a:hover{
    background-color:#34495e;
}

/* Dropdown menu (hidden by default) */
.dropdown-content{
    display:none;
    position:absolute;
    background-color:#34495e;
    min-width:150px;
}

/* Dropdown links */
.dropdown-content a{
    display:block;
    padding:10px;
}

/* Show dropdown on hover */
nav ul li:hover .dropdown-content{
    display:block;
}
</style>

</head>

<body>

<nav>
<ul>
    <li><a href="#">Home</a></li>

    <li>
        <a href="#">Departments</a>
        <div class="dropdown-content">
            <a href="#">CSE</a>
            <a href="#">Mechanical</a>
            <a href="#">Civil</a>
        </div>
    </li>

    <li>
        <a href="#">Courses</a>
        <div class="dropdown-content">
            <a href="#">BTech</a>
            <a href="#">MTech</a>
            <a href="#">MBA</a>
        </div>
    </li>

    <li><a href="#">Contact</a></li>
</ul>
</nav>

</body>
</html>
