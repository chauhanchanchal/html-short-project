<!--8.	Create an HTML form with validation attributes such as required, min, and pattern.-->
<!DOCTYPE html>
<html>
    <head>
        <title>HTML FORM</title>
    </head>
    <style>
  body{
     background-color: rgb(218, 180, 212);
     font-family: Arial, sans-serif;
  }

  .form-box{
      background-color: rgb(249, 147, 218);
      width:400px ;
      margin:50px auto;
      padding: 20px;
      box-shadow: 0px 0px 8px rgb(202, 21, 81);
  }

  h2{
    text-align: centre;
  }

  input{
    width: 100px;
    padding: 8px;
    margin: 8px;
  }
   

  button{
    width: 100%;
    padding: 10px;
    background: rgb(200, 14, 125);
    color: white;
    border: none;
}
button:hover{
    background: red;
}
    </style>



<body>

    <div class="form-box">

<h2>REGISTRATION FORM</h2>


<form>

<label>FULL NAME</label>
<input type="text" required><br>


<label>AGE(18-30)</label>
<input type="number"   min="18"  max="30"  required><br>

<label>EMAIL:</label>
<input type="email" required><br>

<button type="submit">Submit</button><br>


</form>
    </div>
</body>
</html>
