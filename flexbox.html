<!--5.	Design a responsive card using CSS Flexbox for displaying course information.-->
<!DOCTYPE html>
<html>
    <head>
        <title>COURSE CARD</title>
        <style>
         body{
            font-family:Arial, Helvetica, sans-serif;
            background-color: azure;
         }

         h1{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: rgb(105, 57, 150);
            text-align: center;

         }
          
         .container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 30px;
            
         }

         .card{
            background-color: rgb(245, 220, 245);
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgb(250, 5, 201);
         }

         .card h2{
            color: rgb(172, 19, 203);
         }

         button{
            background-color: rgb(217, 81, 208);
            color: rgb(221, 226, 230);
            border: 9px;
            border-radius: 5px;
            padding: 5px;
            cursor: pointer;
         }


         button:hover{
            background-color: rgb(211, 18, 18);
         }
        </style>
    </head>

<body>
    <h1>Available course</h1>

    <div class="container">

             <div class="card">
               <h2>WEB DEVLOPMENT</h2>
               <p> Learn HTML , CSS , Java script to build websites</p>
               <button>Enroll</button>
             </div>

             <div class="card">
               <h2>Python Programming</h2>
               <p>Learn Python for data science and software development.</p>
               <button>Enroll</button>
             </div>


             <div class="card">
                <h2>Data Structures</h2>
                <p>Understand stacks, queues, linked lists and algorithms.</p>
                <button>Enroll</button>
            </div>          
    </div>
</body>
</html>
