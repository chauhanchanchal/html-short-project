<!--4.	Create an HTML page using internal CSS to set background color, fonts, and margins.-->
<!DOCTYPE html>
<html>
    <head>
        <title>INTERNAL CSS</title>
        <style>
        body{
            background-color: rgb(239, 168, 233);
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin: 80px;
        }
        h1{
            text-align: center;
            background-color: rgb(240, 88, 220);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: rgb(77, 21, 74);
            padding : 20px;
            box-shadow: 0px 10px 20px;
            padding: 20px;
        }
        p{
            background-color: rgb(235, 157, 224);
            font-size: larger;
            color:rgba(92, 5, 91, 0.801) ;
            padding: 20px;
            padding : 20px;
            box-shadow: 0px 10px 20px;
        }
        </style>
    </head>
    
<body>
    <h1>Welcome </h1>
    <p>This page demonstrates the use of internal CSS in HTML.</p>

    <p>We have changed the background color, font style, and page margins.</p>
</body>
</html>
