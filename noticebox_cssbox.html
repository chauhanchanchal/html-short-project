<!--10.	 Apply CSS box model properties (margin, padding, border) to design a notice box.-->


<!DOCTYPE html>
<html>
    <head>
        <title>NOTICE BOX</title>
    </head>

     <style>

        .notice{
            background-color:#ffe6e6 ;
            border: 2px solid red;
            padding: 20px;
            margin: 30px;
            width: 300px;
            background-color:#ffe6e6 ;

        }
     </style>
    
    <body>
        <div class="notice">

        <h3>Important notice</h3>

          <p>College will remain closed on Monday due to maintenance.</p>
        </div>
    </body>
</html>
